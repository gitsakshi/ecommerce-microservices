spring.application.name=order-service
server.port=8082

spring.datasource.url=jdbc:mysql://mysql:3306/order_db
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.hikari.initializationFailTimeout=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Enable Circuit Breaker
resilience4j.circuitbreaker.instances.inventoryBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.inventoryBreaker.slidingWindowSize=5
resilience4j.circuitbreaker.instances.inventoryBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.inventoryBreaker.waitDurationInOpenState=10s

resilience4j.timelimiter.instances.inventoryBreaker.timeoutDuration=3s

spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=3000

logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.feign=DEBUG

spring.kafka.bootstrap-servers=kafka:9092

# PRODUCER (OrderPlacedEvent)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# CONSUMER (InventoryConfirmedEvent)
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.sakshi.order_service.model.InventoryConfirmedEvent
